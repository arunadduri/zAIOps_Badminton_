name: Auto Update Gallery

on:
  push:
    paths:
      - 'Photos/**'
    branches:
      - main

jobs:
  update-gallery:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Run gallery update script
        run: python3 update-gallery.py
      
      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet Photos/images.json || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Photos/images.json
          git commit -m "🤖 Auto-update gallery images list"
          git push

